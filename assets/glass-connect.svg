<svg xmlns="http://www.w3.org/2000/svg" width="560" height="180" viewBox="0 0 560 180">
  <defs>
    <!-- Liquid glass background -->
    <linearGradient id="glassBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.07"/>
      <stop offset="35%" stop-color="#c7d2fe" stop-opacity="0.04"/>
      <stop offset="65%" stop-color="#ddd6fe" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.03"/>
    </linearGradient>

    <!-- Glass border -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.10"/>
    </linearGradient>

    <!-- Top shine -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Pill gradients -->
    <linearGradient id="pillFb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1877F2" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1877F2" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="pillIg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E4405F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E4405F" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="pillEm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EA4335" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#EA4335" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="pillDc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5865F2" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5865F2" stop-opacity="0.06"/>
    </linearGradient>

    <!-- Blur for ambient blobs -->
    <filter id="ambientBlur">
      <feGaussianBlur stdDeviation="25"/>
    </filter>

    <!-- Subtle glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient color blobs (simulating refracted light through glass) -->
  <circle cx="120" cy="90" r="80" fill="#818cf8" opacity="0.06" filter="url(#ambientBlur)"/>
  <circle cx="440" cy="70" r="70" fill="#a78bfa" opacity="0.05" filter="url(#ambientBlur)"/>
  <circle cx="280" cy="50" r="60" fill="#60a5fa" opacity="0.04" filter="url(#ambientBlur)"/>

  <!-- Main glass card -->
  <rect x="8" y="8" width="544" height="164" rx="24" ry="24" fill="url(#glassBg)"/>
  <rect x="8" y="8" width="544" height="164" rx="24" ry="24" fill="none" stroke="url(#glassBorder)" stroke-width="1.2"/>

  <!-- Top shine layer -->
  <rect x="24" y="9" width="512" height="75" rx="20" ry="20" fill="url(#shine)"/>

  <!-- Decorative liquid bubbles -->
  <circle cx="50" cy="35" r="4" fill="#818cf8" opacity="0.15"/>
  <circle cx="65" cy="28" r="2.5" fill="#60a5fa" opacity="0.12"/>
  <circle cx="495" cy="32" r="3" fill="#a78bfa" opacity="0.13"/>
  <circle cx="510" cy="25" r="2" fill="#818cf8" opacity="0.10"/>
  <circle cx="45" cy="150" r="3" fill="#60a5fa" opacity="0.10"/>
  <circle cx="515" cy="148" r="3.5" fill="#a78bfa" opacity="0.12"/>

  <!-- Title -->
  <text x="280" y="52" text-anchor="middle" fill="#c9d1d9" font-family="'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif" font-size="17" font-weight="600" letter-spacing="2" filter="url(#glow)">
    ✦  CONNECT  ✦
  </text>

  <!-- Separator line -->
  <line x1="180" y1="68" x2="380" y2="68" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.8"/>

  <!-- Social pill buttons -->
  <!-- Facebook -->
  <rect x="30" y="90" width="115" height="48" rx="24" fill="url(#pillFb)" stroke="#1877F2" stroke-opacity="0.25" stroke-width="0.8"/>
  <!-- Facebook icon path -->
  <g transform="translate(55, 104)" fill="#7aadff" opacity="0.9">
    <path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.563V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z" transform="scale(0.75)"/>
  </g>
  <text x="100" y="119" text-anchor="middle" fill="#7aadff" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500">Facebook</text>

  <!-- Instagram -->
  <rect x="160" y="90" width="115" height="48" rx="24" fill="url(#pillIg)" stroke="#E4405F" stroke-opacity="0.25" stroke-width="0.8"/>
  <g transform="translate(185, 104)" fill="#f0748a" opacity="0.9">
    <path d="M12 2c2.717 0 3.056.01 4.122.06 1.065.05 1.79.217 2.428.465.66.254 1.216.598 1.772 1.153.509.5.902 1.105 1.153 1.772.247.637.415 1.363.465 2.428.047 1.066.06 1.405.06 4.122s-.01 3.056-.06 4.122c-.05 1.065-.218 1.79-.465 2.428a4.883 4.883 0 01-1.153 1.772c-.5.508-1.105.902-1.772 1.153-.637.247-1.363.415-2.428.465-1.066.047-1.405.06-4.122.06s-3.056-.01-4.122-.06c-1.065-.05-1.79-.218-2.428-.465a4.89 4.89 0 01-1.772-1.153A4.904 4.904 0 012.525 18.55c-.247-.637-.415-1.363-.465-2.428C2.013 15.056 2 14.717 2 12s.01-3.056.06-4.122c.05-1.066.217-1.79.465-2.428A4.88 4.88 0 013.678 3.678a4.897 4.897 0 011.772-1.153c.637-.247 1.362-.415 2.428-.465C8.944 2.013 9.283 2 12 2zm0 5a5 5 0 100 10 5 5 0 000-10zm0 8.25a3.25 3.25 0 110-6.5 3.25 3.25 0 010 6.5zM18.406 6.155a1.187 1.187 0 11-2.374 0 1.187 1.187 0 012.374 0z" transform="scale(0.75)"/>
  </g>
  <text x="230" y="119" text-anchor="middle" fill="#f0748a" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500">Instagram</text>

  <!-- Email -->
  <rect x="290" y="90" width="115" height="48" rx="24" fill="url(#pillEm)" stroke="#EA4335" stroke-opacity="0.25" stroke-width="0.8"/>
  <g transform="translate(318, 104)" fill="#f07a6e" opacity="0.9">
    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" transform="scale(0.75)"/>
  </g>
  <text x="358" y="119" text-anchor="middle" fill="#f07a6e" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500">Email</text>

  <!-- Discord -->
  <rect x="420" y="90" width="115" height="48" rx="24" fill="url(#pillDc)" stroke="#5865F2" stroke-opacity="0.25" stroke-width="0.8"/>
  <g transform="translate(447, 104)" fill="#8b96ff" opacity="0.9">
    <path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" transform="scale(0.75)"/>
  </g>
  <text x="488" y="119" text-anchor="middle" fill="#8b96ff" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500">Discord</text>

  <!-- Bottom decorative light streak -->
  <line x1="100" y1="155" x2="460" y2="155" stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.6"/>
</svg>
